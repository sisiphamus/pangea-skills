<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200" role="img" aria-label="Pangea Skills">
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <!-- single quiet highlight, not a rainbow -->
    <radialGradient id="spot" cx="78%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="200" rx="16" fill="url(#wash)"/>
  <rect width="960" height="200" rx="16" fill="url(#spot)"/>

  <!-- thin top edge, barely there -->
  <line x1="48" y1="1" x2="912" y2="1" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- wordmark: heavy, tracked, no decoration -->
  <text x="56" y="92"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="44" font-weight="600" letter-spacing="0.28em"
        fill="#f5f5f5">PANGEA</text>

  <text x="56" y="128"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="15" font-weight="400" letter-spacing="0.42em"
        fill="#737373">SKILLS</text>

  <!-- one line, lowercase, unbothered -->
  <text x="56" y="168"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="13" font-weight="400" letter-spacing="0.06em"
        fill="#525252">skills. install once. leave.</text>

  <!-- tiny status dot — alive, not loud -->
  <circle cx="900" cy="100" r="3.5" fill="#e5e5e5" opacity="0.35"/>
</svg>
